<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Expedición al Norte - Colegio Miraflores</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; background: #c4a882; }

    #pantalla-inicio {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #c4a882 0%, #d4b896 40%, #c8a070 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 32px 24px;
      text-align: center;
      overflow: hidden;
    }

    .sol {
      position: absolute;
      top: 22px;
      right: 34px;
      width: 48px;
      height: 48px;
      background: radial-gradient(circle, #ffe066 60%, #ffb300 100%);
      border-radius: 50%;
      box-shadow: 0 0 22px #ffb30099;
    }

    .ilustracion {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      pointer-events: none;
    }

    img.logo {
      width: 78px;
      height: 78px;
      object-fit: contain;
      margin-bottom: 10px;
      position: relative;
      z-index: 3;
      filter: drop-shadow(0 2px 6px #00000033);
    }

    .colegio-nombre {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5a3a10;
      margin-bottom: 2px;
      position: relative;
      z-index: 3;
    }

    .colegio-lema {
      font-size: 12px;
      font-weight: 700;
      font-style: italic;
      color: #7a4a18;
      margin-bottom: 16px;
      position: relative;
      z-index: 3;
    }

    h1 {
      font-size: 20px;
      font-weight: 900;
      color: #2a1a08;
      line-height: 1.3;
      margin-bottom: 22px;
      position: relative;
      z-index: 3;
    }

    h1 em {
      color: #5a3a10;
      font-style: italic;
    }

    #btn-iniciar {
      background: #7a4a18;
      color: #f5e6c8;
      border: none;
      padding: 16px 0;
      width: 100%;
      max-width: 260px;
      font-size: 15px;
      font-weight: 900;
      border-radius: 50px;
      cursor: pointer;
      position: relative;
      z-index: 3;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 14px #00000033;
    }

    .instruccion-texto {
      font-size: 12px;
      color: #5a3a10;
      margin-top: 14px;
      position: relative;
      z-index: 3;
      font-weight: 600;
    }

    #instruccion {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(90, 58, 16, 0.88);
      color: #f5e6c8;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 700;
      z-index: 999;
      display: none;
      text-align: center;
      border: 1px solid #7a4a18;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="pantalla-inicio">
    <div class="sol"></div>

    <!-- Ilustración SVG del desierto -->
    <svg class="ilustracion" viewBox="0 0 340 180" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="170" cy="175" rx="200" ry="20" fill="#a0784a" opacity="0.5"/>
      <!-- Saguaro izquierdo -->
      <rect x="30" y="60" width="18" height="110" rx="9" fill="#5a7a3a"/>
      <rect x="15" y="90" width="30" height="14" rx="7" fill="#5a7a3a"/>
      <rect x="8" y="75" width="14" height="40" rx="7" fill="#5a7a3a"/>
      <line x1="39" y1="80" x2="39" y2="170" stroke="#4a6a2a" stroke-width="1.5" opacity="0.5"/>
      <!-- Saguaro derecho -->
      <rect x="270" y="90" width="14" height="80" rx="7" fill="#5a7a3a"/>
      <rect x="258" y="110" width="26" height="11" rx="5.5" fill="#5a7a3a"/>
      <rect x="252" y="100" width="11" height="30" rx="5.5" fill="#5a7a3a"/>
      <!-- Vaca - cuerpo -->
      <ellipse cx="180" cy="148" rx="38" ry="22" fill="#f5f0e8"/>
      <ellipse cx="168" cy="143" rx="10" ry="8" fill="#3a2a1a" opacity="0.7"/>
      <ellipse cx="192" cy="150" rx="8" ry="6" fill="#3a2a1a" opacity="0.6"/>
      <!-- Vaca - cabeza -->
      <ellipse cx="215" cy="138" rx="16" ry="13" fill="#f5f0e8"/>
      <ellipse cx="226" cy="143" rx="8" ry="6" fill="#e8c8b0"/>
      <circle cx="218" cy="134" r="2.5" fill="#1a1a1a"/>
      <circle cx="219" cy="133" r="0.8" fill="white"/>
      <ellipse cx="208" cy="128" rx="5" ry="3" fill="#e0b090" transform="rotate(-20 208 128)"/>
      <path d="M210 126 Q205 118 200 120" stroke="#c8a060" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M215 125 Q214 116 220 117" stroke="#c8a060" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Vaca - patas -->
      <rect x="152" y="165" width="8" height="16" rx="4" fill="#d4c8b0"/>
      <rect x="165" y="166" width="8" height="15" rx="4" fill="#d4c8b0"/>
      <rect x="185" y="166" width="8" height="15" rx="4" fill="#d4c8b0"/>
      <rect x="198" y="165" width="8" height="16" rx="4" fill="#d4c8b0"/>
      <path d="M143 148 Q132 140 134 152 Q136 158 143 155" stroke="#d4c8b0" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Piedras -->
      <ellipse cx="90" cy="168" rx="12" ry="7" fill="#a08060" opacity="0.6"/>
      <ellipse cx="250" cy="172" rx="9" ry="5" fill="#a08060" opacity="0.5"/>
      <ellipse cx="130" cy="172" rx="6" ry="4" fill="#907050" opacity="0.4"/>
    </svg>

    <img class="logo" src="logo.jpg" alt="Escudo Colegio Miraflores" />

    <p class="colegio-nombre">Colegio Miraflores</p>
    <p class="colegio-lema">"México de mis amores"</p>

    <h1>Expedición al norte:<br><em>tierra de gigantes<br>y desiertos</em></h1>

    <button id="btn-iniciar" onclick="iniciarAR()">
      🎥 &nbsp; Abrir la cámara
    </button>

    <p class="instruccion-texto">📍 Apunta la cámara al marcador</p>
  </div>

  <div id="instruccion">🌵 Apunta al marcador de la maqueta</div>

  <!--
    ARCHIVOS NECESARIOS EN GITHUB:
    - index.html  (este archivo)
    - real de catorce.webm  (tu video)
    - logo.jpg  (escudo del colegio)

    MARCADOR: Hiro — imprime desde:
    https://raw.githack.com/AR-js-org/AR.js/master/data/images/hiro.png
  -->
  <a-scene
    id="escena-ar"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
    style="display:none;"
  >
    <a-assets>
      <video
        id="video-norte"
        src="real de catorce.webm"
        preload="auto"
        loop="true"
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-marker preset="hiro" id="marcador">
      <a-video
        src="#video-norte"
        width="1.8"
        height="2.4"
        position="0 0 0"
        rotation="-90 0 0"
        transparent="true"
      ></a-video>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    function iniciarAR() {
      document.getElementById('pantalla-inicio').style.display = 'none';
      document.getElementById('escena-ar').style.display = 'block';
      document.getElementById('instruccion').style.display = 'block';

      const marcador = document.getElementById('marcador');
      const video = document.getElementById('video-norte');

      // Al detectar el marcador por primera vez, arranca el video
      marcador.addEventListener('markerFound', () => {
        video.play();
        document.getElementById('instruccion').textContent = '✨ ¡Real de Catorce encontrado!';
      });

      // El video sigue reproduciéndose aunque se pierda el marcador
    }
  </script>

</body>
</html>
