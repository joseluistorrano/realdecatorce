<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Expedición al Norte - Colegio Miraflores</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; background: #c4a882; }

    #pantalla-inicio {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #c4a882 0%, #d4b896 40%, #c8a070 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; padding: 32px 24px;
      text-align: center; overflow: hidden;
    }
    .sol {
      position: absolute; top: 22px; right: 34px;
      width: 48px; height: 48px;
      background: radial-gradient(circle, #ffe066 60%, #ffb300 100%);
      border-radius: 50%; box-shadow: 0 0 22px #ffb30099;
    }
    .ilustracion {
      position: absolute; bottom: 0; left: 0; right: 0;
      width: 100%; pointer-events: none;
    }
    img.logo {
      width: 78px; height: 78px; object-fit: contain;
      margin-bottom: 10px; position: relative; z-index: 3;
      filter: drop-shadow(0 2px 6px #00000033);
    }
    .colegio-nombre {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #5a3a10;
      margin-bottom: 2px; position: relative; z-index: 3;
    }
    .colegio-lema {
      font-size: 12px; font-weight: 700; font-style: italic;
      color: #7a4a18; margin-bottom: 16px; position: relative; z-index: 3;
    }
    h1 {
      font-size: 20px; font-weight: 900; color: #2a1a08;
      line-height: 1.3; margin-bottom: 22px; position: relative; z-index: 3;
    }
    h1 em { color: #5a3a10; font-style: italic; }
    #btn-iniciar {
      background: #7a4a18; color: #f5e6c8; border: none;
      padding: 16px 0; width: 100%; max-width: 260px;
      font-size: 15px; font-weight: 900; border-radius: 50px;
      cursor: pointer; position: relative; z-index: 3;
      box-shadow: 0 4px 14px #00000033;
    }
    .instruccion-texto {
      font-size: 12px; color: #5a3a10; margin-top: 14px;
      position: relative; z-index: 3; font-weight: 600;
    }

    /* Cámara de fondo */
    #camara-fondo {
      display: none;
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Video del alumno encima de la cámara */
    #video-alumno {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100vw;
      height: 60vh;
      object-fit: cover;
      z-index: 10;
      border-radius: 0;
    }

    #instruccion {
      position: fixed; bottom: 24px; left: 50%;
      
      background: rgba(90, 58, 16, 0.88);
      color: #f5e6c8; padding: 10px 22px;
      border-radius: 30px; font-size: 14px;
      font-weight: 700; z-index: 999;
      display: none; text-align: center;
      border: 1px solid #7a4a18; white-space: nowrap;
    }

    #btn-play {
      display: none;
      position: fixed; bottom: 70px; left: 50%;
      
      background: #7a4a18; color: #f5e6c8;
      border: none; padding: 14px 32px;
      font-size: 15px; font-weight: 900;
      border-radius: 50px; cursor: pointer;
      z-index: 999; box-shadow: 0 4px 14px #00000055;
    }
  </style>
</head>
<body>

  <!-- Pantalla de bienvenida -->
  <div id="pantalla-inicio">
    <div class="sol"></div>
    <svg class="ilustracion" viewBox="0 0 340 180" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="170" cy="175" rx="200" ry="20" fill="#a0784a" opacity="0.5"/>
      <rect x="30" y="60" width="18" height="110" rx="9" fill="#5a7a3a"/>
      <rect x="15" y="90" width="30" height="14" rx="7" fill="#5a7a3a"/>
      <rect x="8" y="75" width="14" height="40" rx="7" fill="#5a7a3a"/>
      <rect x="270" y="90" width="14" height="80" rx="7" fill="#5a7a3a"/>
      <rect x="258" y="110" width="26" height="11" rx="5.5" fill="#5a7a3a"/>
      <rect x="252" y="100" width="11" height="30" rx="5.5" fill="#5a7a3a"/>
      <ellipse cx="180" cy="148" rx="38" ry="22" fill="#f5f0e8"/>
      <ellipse cx="168" cy="143" rx="10" ry="8" fill="#3a2a1a" opacity="0.7"/>
      <ellipse cx="192" cy="150" rx="8" ry="6" fill="#3a2a1a" opacity="0.6"/>
      <ellipse cx="215" cy="138" rx="16" ry="13" fill="#f5f0e8"/>
      <ellipse cx="226" cy="143" rx="8" ry="6" fill="#e8c8b0"/>
      <circle cx="218" cy="134" r="2.5" fill="#1a1a1a"/>
      <circle cx="219" cy="133" r="0.8" fill="white"/>
      <ellipse cx="208" cy="128" rx="5" ry="3" fill="#e0b090" transform="rotate(-20 208 128)"/>
      <path d="M210 126 Q205 118 200 120" stroke="#c8a060" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M215 125 Q214 116 220 117" stroke="#c8a060" stroke-width="2" fill="none" stroke-linecap="round"/>
      <rect x="152" y="165" width="8" height="16" rx="4" fill="#d4c8b0"/>
      <rect x="165" y="166" width="8" height="15" rx="4" fill="#d4c8b0"/>
      <rect x="185" y="166" width="8" height="15" rx="4" fill="#d4c8b0"/>
      <rect x="198" y="165" width="8" height="16" rx="4" fill="#d4c8b0"/>
      <path d="M143 148 Q132 140 134 152 Q136 158 143 155" stroke="#d4c8b0" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="90" cy="168" rx="12" ry="7" fill="#a08060" opacity="0.6"/>
      <ellipse cx="250" cy="172" rx="9" ry="5" fill="#a08060" opacity="0.5"/>
    </svg>

    <img class="logo" src="logo.png" alt="Escudo Colegio Miraflores" />
    <p class="colegio-nombre">Colegio Miraflores</p>
    <p class="colegio-lema">"México de mis amores"</p>
    <h1>Expedición al norte:<br><em>tierra de gigantes<br>y desiertos</em></h1>
    <button id="btn-iniciar" onclick="iniciarAR()">🎥 &nbsp; Abrir la cámara</button>
    <p class="instruccion-texto">📍 Apunta la cámara al marcador</p>
  </div>

  <!-- Cámara de fondo -->
  <video id="camara-fondo" autoplay playsinline muted></video>

  <!-- Video del proyecto encima -->
  <video id="video-alumno" src="real de catorce.webm" loop playsinline webkit-playsinline crossorigin="anonymous"></video>

  <!-- Botón para iniciar el video manualmente -->
  <button id="btn-play" onclick="reproducirVideo()">▶️ &nbsp; Ver Real de Catorce</button>

  <div id="instruccion">🌵 Toca el botón para ver el video</div>

  <script>
    async function iniciarAR() {
      document.getElementById('pantalla-inicio').style.display = 'none';

      // Activar cámara trasera como fondo
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        const camaraEl = document.getElementById('camara-fondo');
        camaraEl.srcObject = stream;
        camaraEl.style.display = 'block';
      } catch(e) {
        console.warn('Cámara no disponible:', e);
      }

      // Mostrar botón e instrucción
      document.getElementById('btn-play').style.display = 'block';
      document.getElementById('instruccion').style.display = 'block';
    }

    function reproducirVideo() {
      const video = document.getElementById('video-alumno');
      const btn = document.getElementById('btn-play');

      video.style.display = 'block';
      video.play();
      btn.style.display = 'none';
      document.getElementById('instruccion').textContent = '✨ ¡Real de Catorce!';
    }
  </script>

</body>
</html>
